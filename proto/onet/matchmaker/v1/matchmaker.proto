syntax = "proto3";

package onet.matchmaker.v1;

option csharp_namespace = "Onet.Matchmaker.V1";
option java_multiple_files = true;
option java_outer_classname = "MatchmakerProto";
option java_package = "com.onet.matchmaker.v1";

import "onet/common/v1/common_types.proto";

service MatchMakerService {
  // 매칭 시작. 매칭 완료까지 이벤트를 스트림으로 수신
  rpc StartMatch(MatchRequest) returns (stream MatchEvent);
}

message MatchRequest {
  string lobby_token = 1;
  onet.common.v1.MatchMode mode = 2;
  // 명시 맵 ID (디버그/지정용). 0 = 미지정 (map_type 사용).
  int32 map_id = 3;
  // 맵 사이즈 그룹. 6/7/8/9/10/11/12. 0 = 미지정 (전체 랜덤).
  // map_id 가 지정되면 그것이 우선, 아니면 동일 map_type 풀에서 랜덤 픽.
  int32 map_type = 4;
}

message MatchEvent {
  oneof event {
    MatchingStarted matching_started = 1;
    MatchFound match_found = 2;
  }
}

// 매칭 대기 시작
message MatchingStarted {}

// 매칭 완료 - 배틀서버 접속 정보 전달
message MatchFound {
  string battle_server_url = 1;
  string battle_token = 2;
  onet.common.v1.MatchMode mode = 3;
  // 서비스 내부 프록시(web-client)용 주소. 일반 클라이언트는 battle_server_url 사용
  string battle_server_internal_url = 4;
}
