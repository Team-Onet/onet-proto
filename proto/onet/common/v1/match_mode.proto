syntax = "proto3";

package onet.common.v1;

option csharp_namespace = "Onet.Common.V1";
option java_multiple_files = true;
option java_outer_classname = "MatchModeProto";
option java_package = "com.onet.common.v1";

enum MatchMode {
  MATCH_MODE_UNSPECIFIED = 0;
  MATCH_MODE_BOT = 10;       // 봇 매칭 (즉시 완료)
  MATCH_MODE_SOLO = 20;      // 1v1
  MATCH_MODE_TEAM_2V2 = 30;  // 2v2
  MATCH_MODE_TEAM_3V3 = 40;  // 3v3
}
