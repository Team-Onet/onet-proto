syntax = "proto3";

package onet.battle.v1;

option csharp_namespace = "Onet.Battle.V1";
option java_multiple_files = true;
option java_outer_classname = "BattleProto";
option java_package = "com.onet.battle.v1";

import "onet/battle/v1/battle_types.proto";
import "onet/common/v1/common_types.proto";
import "onet/common/v1/error_code.proto";

// ============================================================
// 도메인 페이로드 (envelope 와 service 는 battle_base.proto)
// ============================================================

// 룸 입장. battle_token 은 MatchMaker 가 발급한 JWT.
// 페이로드: roomId, playerId, nickname, level
message JoinRoomRequest {
  string battle_token = 1;
}

// 블록 좌표 선택.
// 첫 번째 호출 → 블록 선택, 두 번째 호출 → 매칭 시도.
// 이미 선택한 블록과 같은 좌표 전송 시 → 선택 해제.
message SelectBlockRequest {
  int32 pos_x = 1;
  int32 pos_y = 2;
}

// 아이템 사용 요청. 자신의 턴에서만 유효.
message UseItemRequest {
  onet.common.v1.ItemType item_type = 1;
}

// 보드 전체 상태 동기화 요청.
// 앱 백그라운드 복귀, 재접속 등 상태 불일치 의심 시 사용.
message BoardSyncRequest {}

// 포기 선언. 즉시 패배 처리 후 GameResult 전송.
message GiveUpRequest {}


// 룸 입장 완료. 초기 보드 상태 포함.
// 모든 플레이어가 받으며, 이후 GameStarted 를 기다린다.
message RoomJoined {
  string room_id = 1;
  repeated PlayerInfo players = 2;
  BoardState board_state = 3;
  onet.common.v1.MatchMode mode = 4;
  string my_player_id = 5;  // 수신자 본인의 playerId
}

// 모든 플레이어 입장 완료 → 게임 시작.
// 이 메시지 이후 첫 번째 NextTurn 이 전송된다.
message GameStarted {
  int64 started_at_ms = 1;  // 서버 기준 게임 시작 타임스탬프
}

// 다음 턴 시작. 모든 플레이어에게 브로드캐스트.
// turn_end_at_unix_ms: 이번 턴 종료 절대시각 (서버 unix ms). 클라는
// server_time_ms 와 비교해 drift 보정 후 (deadline - now) 로 잔여시간 계산.
// turn_time_ms 는 원본 제한시간 (동적 조작 전 기준), deadline 은 실시간 값.
message NextTurn {
  string player_id = 1;
  int32 turn_time_ms = 2;       // 이번 턴 제한시간 (ms), 지수 감소 적용됨
  int32 turn_number = 3;        // 전체 턴 카운터 (1부터 시작)
  bool is_prev_timeout = 4;     // 이전 턴이 타임아웃으로 종료된 경우 true
  int64 turn_end_at_unix_ms = 5; // 이번 턴 종료 절대시각 (서버 unix ms)
}

// 블록 선택/해제 브로드캐스트.
// is_deselected = true 이면 선택이 해제된 것.
message BlockSelected {
  string player_id = 1;
  BlockPos pos = 2;
  bool is_deselected = 3;
}

// 매칭 성공 브로드캐스트. 이후 서버가 NextTurn 을 전송한다.
message BlockMatched {
  string player_id = 1;
  BlockPos pos1 = 2;
  BlockPos pos2 = 3;
  repeated BlockPos path = 4;          // 경로상 모든 좌표 (pos1, pos2 포함)
  repeated OccupiedSlot occupied = 5;  // 이번 매칭으로 점유된 슬롯 목록
  int32 match_score = 6;               // 획득 점수 (점유 슬롯 합산)
  int32 remaining_block_count = 7;     // 매칭 후 남은 블록 수
}

// 매칭 실패 브로드캐스트 (경로 없음 or 타입 불일치).
// 클라이언트는 선택을 초기화하고 재시도 허용.
message BlockMatchFailed {
  string player_id = 1;
  BlockPos pos1 = 2;
  BlockPos pos2 = 3;
}

// 턴 타임아웃. 이후 서버가 NextTurn 을 전송한다.
message TurnTimeout {
  string player_id = 1;
}

// 보드 셔플 완료 브로드캐스트.
// 타임아웃 연속 발생 또는 ITEM_TYPE_SHUFFLE 사용 시.
message BoardShuffled {
  repeated BlockMove moves = 1;  // 각 블록의 이전 위치 → 새 위치 매핑
}

// 보드 전체 상태 동기화 응답.
// turn_end_at_unix_ms: 현재 턴 종료 절대시각 (서버 unix ms).
// 클라는 매 프레임 (deadline - now + drift) 로 잔여시간 계산.
message BoardSyncResponse {
  BoardState board_state = 1;
  string current_player_id = 2;     // 현재 턴 플레이어
  int64 turn_end_at_unix_ms = 3;    // 현재 턴 종료 절대시각 (서버 unix ms)
}

// 아이템 사용 결과 브로드캐스트.
// hint_blocks 는 ITEM_TYPE_FIND 사용자 본인에게만 전송됨.
message ItemUsed {
  string player_id = 1;
  onet.common.v1.ItemType item_type = 2;
  repeated BlockPos hint_blocks = 3;  // ITEM_TYPE_FIND: [pos1, pos2] 힌트 쌍
}

// 게임 최종 결과. 모든 블록 제거 또는 조기 종료 시 전송.
message GameResult {
  repeated TeamResult teams = 1;
  repeated PlayerResult players = 2;
  bool is_draw = 3;
  GameEndReason end_reason = 4;
  int64 ended_at_ms = 5;
}

// 플레이어 퇴장 (포기 or 연결 끊김).
// 상대 플레이어에게 브로드캐스트 후 GameResult 전송.
message PlayerLeft {
  string player_id = 1;
  PlayerLeftReason reason = 2;
}

// 스트림 내 비치명적 에러 알림.
// 연결은 유지되며 클라이언트는 해당 동작만 무시.
// 예) 자기 턴이 아닌데 블록 선택, 유효하지 않은 좌표 등.
message StreamError {
  onet.common.v1.ErrorCode code = 1;
  string message = 2;
}

// ============================================================
// 공통 타입
// ============================================================

message BlockPos {
  int32 x = 1;
  int32 y = 2;
}

message PlayerInfo {
  string player_id = 1;
  string nickname = 2;
  int32 level = 3;
  string team_id = 4;  // 서버가 부여한 팀 식별자. 같은 team_id = 같은 팀.
  bool is_bot = 5;     // 봇 플레이어 여부
}

// 보드 전체 상태 스냅샷.
// RoomJoined 및 BoardSyncResponse 에서 사용.
// width/height/seed/map_id 는 RoomJoined 에서만 의미있고 BoardSyncResponse 에서는 무시해도 됨.
message BoardState {
  repeated BlockData blocks = 1;         // 현재 남아있는 블록 목록
  repeated SlotData occupied_slots = 2;  // 점유된 슬롯만 포함 (미점유 생략)
  int32 total_block_count = 3;           // 게임 시작 시 전체 블록 수
  int32 remaining_block_count = 4;       // 현재 남은 블록 수
  int32 width = 5;   // 보드 가로 크기
  int32 height = 6;  // 보드 세로 크기
  int64 seed = 7;    // 셔플 동기화용 랜덤 시드
}

message BlockData {
  BlockPos pos = 1;
  int32 art_num = 2;  // 블록 종류 식별자. 같은 art_num 끼리 매칭 가능.
  // SIEGE 모드 한정: 블록 소유 팀. "A"=내 팀, "B"=상대 팀, "NEUTRAL"=황금 더미.
  // 시즈 외 모드에서는 빈 문자열 (무시).
  string team_id = 3;
}

// 점유된 슬롯 정보.
message SlotData {
  BlockPos pos = 1;
  string occupied_player_id = 2;
  string occupied_team_id = 3;
}

// 매칭 성공 시 점유된 슬롯 상세 정보.
message OccupiedSlot {
  BlockPos pos = 1;
  string player_id = 2;
  string team_id = 3;
  bool is_retaken = 4;  // 상대팀 슬롯을 역전 점유한 경우 true
}

// 셔플 시 블록 이동 정보.
message BlockMove {
  BlockPos from = 1;
  BlockPos to = 2;
}

// 팀 결과.
message TeamResult {
  string team_id = 1;
  repeated string player_ids = 2;
  int32 tile_count = 3;
  bool is_winner = 4;
}

// 플레이어 개인 결과.
message PlayerResult {
  string player_id = 1;
  string team_id = 2;
  int32 tile_count = 3;    // 점유한 슬롯 수
  int32 matched_count = 4; // 성공 매칭 횟수
  int32 timeout_count = 5; // 타임아웃 횟수
}

// ============================================================
// Siege Mode (성 부시기, 프로토타입)
// MATCH_MODE_SIEGE_SOLO 에서만 사용. 그 외 모드에서는 발행되지 않음.
//
// 추상 트랙: 좌측 성 position=0, 우측 성 position=track_length.
// 대포는 시간 기반으로 turn-independent 이동.
// 모든 거리/체력/공격력은 float (프로토타입 단순화).
// ============================================================

// 시즈 초기 상태. RoomJoined 직후 SiegeStateInit 1회 발행.
message SiegeStateInit {
  repeated SiegeCastle castles = 1;       // team_id 별 1개
  repeated int32 my_deck_art_nums = 2;    // 수신자 본인 덱 (6개, 중복 없음)
  repeated int32 opp_deck_art_nums = 3;   // 상대 덱 (6개)
  float track_length = 4;                 // 추상 길이 (기본 100)
  float cannon_speed_per_sec = 5;         // 대포 기본 속도
}

message SiegeCastle {
  string team_id = 1;
  float position = 2;       // 트랙 좌표
  float hp = 3;
  float max_hp = 4;
  float fire_range = 5;     // 성 사거리
  float fire_atk = 6;       // 성 공격력
  bool faces_right = 7;     // 우측 진군 여부 (좌 성=true, 우 성=false)
}

// 신규 대포 spawn. 자기 턴 종료 시 또는 첫 턴 페어 종료 직후.
message CannonSpawned {
  string cannon_id = 1;
  string owner_team_id = 2;
  float position = 3;
  float speed_per_sec = 4;   // 부호 포함 (좌→우=양수, 우→좌=음수)
  float hp = 5;
  float max_hp = 6;
  float fire_range = 7;
}

// 대포 좌표 sync. 1초 주기 + 이벤트 발생 직후.
// 클라는 position + (now - at_unix_ms) * speed_per_sec 로 보간.
// speed_per_sec 는 ping-pong reflect 로 부호가 바뀔 수 있어 매 sync 마다 같이 보냄.
message CannonMoved {
  string cannon_id = 1;
  float position = 2;
  int64 at_unix_ms = 3;
  float speed_per_sec = 4;
}

// 매칭으로 사거리 내 모든 자기측 cannon/castle 동시 장전.
message AmmoLoaded {
  // 장전 대상 1건당 1개 항목.
  message Entry {
    // "CANNON:{cannon_id}" 또는 "CASTLE:{team_id}".
    string holder_id = 1;
    int32 art_num = 2;
    float atk = 3;
    int32 added = 4;          // 이번에 추가된 발 수
    int32 total = 5;          // 누적 잔탄 (해당 art_num)
  }
  string source_player_id = 1;  // 매칭한 플레이어 (장전 트리거)
  repeated Entry entries = 2;
}

// 대포 발사 (즉시, 사거리 내 가장 가까운 적). 사거리 밖이면 발행되지 않음.
message CannonFired {
  string src_cannon_id = 1;
  string dst_id = 2;            // "CANNON:{id}" 또는 "CASTLE:{team_id}"
  int32 art_num = 3;
  float damage = 4;
  int64 fired_at_unix_ms = 5;
  int64 impact_at_unix_ms = 6;  // 포물선 도착 예상 시각 (효과 동기화)
}

// 성 발사 (졸라맨 throw). atk 2.5, 사거리 = 대포의 2배.
message CastleFired {
  string src_team_id = 1;
  string dst_id = 2;
  int32 art_num = 3;
  float damage = 4;
  int64 fired_at_unix_ms = 5;
  int64 impact_at_unix_ms = 6;
}

// 오브젝트 hp 변경 (대포 피격, 성 피격 공통).
// hp == 0 이면 별도 ObjectDestroyed 후속 발행.
message SiegeObjectHpChanged {
  string object_id = 1;  // "CANNON:{id}" or "CASTLE:{team_id}"
  float hp = 2;
  float max_hp = 3;
}

// 대포 파괴 (hp 0). 클라는 이후 해당 cannon_id 무시.
message SiegeObjectDestroyed {
  string object_id = 1;
}

// 시즈 모드 종료.
message SiegeResult {
  string winner_team_id = 1;
  SiegeEndReason end_reason = 2;
  int64 ended_at_unix_ms = 3;
}

enum SiegeEndReason {
  SIEGE_END_REASON_UNSPECIFIED = 0;
  SIEGE_END_REASON_CASTLE_DESTROYED = 1;  // 적 성 hp 0
  SIEGE_END_REASON_BOARD_EMPTY = 2;       // 블록 소진, 적 성 hp > 0 → 매칭 트리거 측 패
  SIEGE_END_REASON_GIVE_UP = 3;
}
