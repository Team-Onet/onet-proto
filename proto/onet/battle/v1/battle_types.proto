syntax = "proto3";

package onet.battle.v1;

option csharp_namespace = "Onet.Battle.V1";
option java_multiple_files = true;
option java_outer_classname = "BattleTypesProto";
option java_package = "com.onet.battle.v1";

enum GameEndReason {
  GAME_END_REASON_UNSPECIFIED = 0;
  GAME_END_REASON_ALL_BLOCKS_CLEARED = 1;  // 모든 블록 제거로 정상 종료
  GAME_END_REASON_GIVE_UP = 2;             // 플레이어 포기
  GAME_END_REASON_PLAYER_LEFT = 3;         // 플레이어 연결 끊김
  GAME_END_REASON_TURN_LIMIT_EXCEEDED = 4; // 연속 턴 제한 초과로 자동 종료 (입력 없는 턴이 제한 횟수 이상 지속)
  GAME_END_REASON_ABORTED = 5;             // 시스템 오류로 강제 종료 (셔플 불가 등)
}

enum PlayerLeftReason {
  PLAYER_LEFT_REASON_UNSPECIFIED = 0;
  PLAYER_LEFT_REASON_GIVE_UP = 1;
  PLAYER_LEFT_REASON_DISCONNECTED = 2;
}

enum EffectType {
  EFFECT_TYPE_UNSPECIFIED = 0;
  EFFECT_TYPE_BLOCK_MATCHED = 1;     // 매칭 성공 점령 연출
  EFFECT_TYPE_FEVER = 2;             // 피버 진입 (isHighlighted 발동)
  EFFECT_TYPE_BOARD_SHUFFLED = 3;    // 자동 셔플 연출
  EFFECT_TYPE_COMBO_BREAK = 4;       // 콤보 윈도우 만료/턴 타임아웃 등으로 콤보 끊김
  // 향후: COMBO, MILESTONE, STREAK, ITEM_* 등
}
