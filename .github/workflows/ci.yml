name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-breaking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          breaking: true
          breaking_against: ${{ github.event_name == 'pull_request' && format('https://github.com/{0}/onet-proto.git#branch=main', github.repository_owner) || '' }}
