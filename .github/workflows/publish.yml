name: Publish Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-csharp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          push: false
          lint: false
          breaking: false

      - name: Generate code
        run: buf generate

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          dotnet pack csharp/Onet.Proto.csproj \
            -p:Version=$VERSION \
            --output ./nupkg

      - name: Publish
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

  publish-java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          push: false
          lint: false
          breaking: false

      - name: Generate code
        run: buf generate

      - name: Inspect generated Java (version check)
        run: head -30 gen/java/com/onet/common/v1/CommonProto.java

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Deploy
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn deploy \
            -f java/pom.xml \
            -Drevision=$VERSION \
            -s ${{ github.workspace }}/.github/maven-settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
