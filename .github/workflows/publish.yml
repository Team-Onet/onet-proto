name: Publish Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-csharp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: bufbuild/buf-action@v1
        with:
          push: false
          lint: false
          breaking: false

      - name: Generate code
        run: buf generate

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          dotnet pack csharp/Onet.Proto.csproj \
            -p:Version=$VERSION \
            --output ./nupkg

      - name: Delete old NuGet package versions
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: 'Onet.Proto'
          package-type: nuget
          min-versions-to-keep: 3
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          dotnet nuget push ./nupkg/*.snupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

  publish-java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: bufbuild/buf-action@v1
        with:
          push: false
          lint: false
          breaking: false

      - name: Generate code
        run: buf generate

      - name: Inspect generated Java (version check)
        run: head -30 java/src/main/java/com/onet/common/v1/CommonProto.java

      - name: Inspect generated Kotlin (version check)
        run: head -30 java/src/main/kotlin/com/onet/common/v1/PingRequestKt.kt

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Delete old Maven package versions
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: 'com.onet.onet-proto'
          package-type: maven
          min-versions-to-keep: 3
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        run: gradle publish -Pversion=${GITHUB_REF_NAME#v}
        working-directory: java
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
